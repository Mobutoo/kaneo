name: CI — Build & Push to GHCR

# Triggered on every push to main (custom VPAI modifications)
# Produces:
#   ghcr.io/mobutoo/api:<sha>   (kaneo-api)
#   ghcr.io/mobutoo/web:<sha>   (kaneo-web)
#
# These images are consumed by VPAI via inventory/group_vars/all/versions.yml
# Usage: set kaneo_api_image / kaneo_web_image to the sha-tagged images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/ci-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/web

jobs:
  build-api:
    name: Build kaneo-api
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    outputs:
      sha_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push kaneo-api
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kaneo-api
          cache-to: type=gha,mode=max,scope=kaneo-api

  build-web:
    name: Build kaneo-web
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    outputs:
      sha_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Web
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push kaneo-web
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kaneo-web
          cache-to: type=gha,mode=max,scope=kaneo-web

  summary:
    name: Build summary
    runs-on: ubuntu-24.04
    needs: [build-api, build-web]
    if: always()
    steps:
      - name: Print image references
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "## Kaneo Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.IMAGE_API }}:sha-${SHA_SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ env.IMAGE_WEB }}:sha-${SHA_SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update VPAI \`versions.yml\`:" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          echo "kaneo_api_image: \"${{ env.IMAGE_API }}:sha-${SHA_SHORT}\"" >> $GITHUB_STEP_SUMMARY
          echo "kaneo_web_image: \"${{ env.IMAGE_WEB }}:sha-${SHA_SHORT}\"" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
